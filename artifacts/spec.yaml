version: 1

scenarios:
  - id: "KANBAN-001"
    name: "카드 추가"
    given: "'To Do' 칼럼이 표시된 칸반 보드"
    when: "'추가' 버튼을 클릭하고 제목 입력란에 제목을 입력한 뒤 확인한다"
    then: "해당 칼럼 하단에 새 카드가 추가되어 표시된다"
    examples:
      - input: { column: "To Do", action: "clickAdd" }
        expect: { titleInputVisible: true }
      - input: { column: "To Do", title: "우유 사기" }
        expect: { cardText: "우유 사기", column: "To Do" }
      - input: { column: "To Do", title: "" }
        expect: { errorMessage: "제목을 입력해주세요" }

  - id: "KANBAN-002"
    name: "카드 인라인 편집"
    given: "'우유 사기' 카드가 있는 칸반 보드"
    when: "카드를 클릭하여 상세 편집 화면에서 필드를 수정한다"
    then: "변경된 내용이 카드에 반영되어 표시된다"
    examples:
      - input: { cardTitle: "우유 사기", action: "click" }
        expect: { detailPanelVisible: true, titleFieldValue: "우유 사기" }
      - input: { cardTitle: "우유 사기", newTitle: "빵 사기" }
        expect: { cardText: "빵 사기" }
      - input: { cardTitle: "우유 사기", priority: "높음" }
        expect: { priorityLabel: "높음" }
      - input: { cardTitle: "우유 사기", tag: "장보기" }
        expect: { tagText: "장보기", visible: true }
      - input: { cardTitle: "우유 사기", dueDate: "2026-03-25" }
        expect: { dueDateText: "2026-03-25", visible: true }

  - id: "KANBAN-003"
    name: "카드 삭제"
    given: "'우유 사기' 카드의 상세 화면이 열린 상태"
    when: "'삭제' 버튼을 클릭한다"
    then: "확인 대화상자가 표시되고, 확인 시 카드가 삭제된다"
    examples:
      - input: { action: "confirm" }
        expect: { confirmDialog: "정말 삭제하시겠습니까?", cardVisible: false }
      - input: { action: "cancel" }
        expect: { confirmDialog: "정말 삭제하시겠습니까?", cardVisible: true }

  - id: "KANBAN-004"
    name: "카드 드래그&드롭 이동"
    given: "'To Do' 칼럼에 '우유 사기' 카드가 있는 칸반 보드"
    when: "'우유 사기' 카드를 다른 칼럼으로 드래그한다"
    then: "카드가 원래 칼럼에서 사라지고 대상 칼럼에 표시된다"
    examples:
      - input: { card: "우유 사기", from: "To Do", to: "In Progress" }
        expect: { todoCount: 0, inProgressCount: 1, cardColumn: "In Progress" }
      - input: { card: "우유 사기", from: "Done", to: "To Do" }
        expect: { doneCount: 0, todoCount: 1, cardColumn: "To Do" }
      - input: { card: "빵 사기", column: "To Do", fromPosition: 1, toPosition: 0 }
        expect: { firstCardText: "빵 사기", secondCardText: "우유 사기" }

  - id: "KANBAN-005"
    name: "서브태스크 관리"
    given: "'우유 사기' 카드의 상세 화면이 열린 상태"
    when: "서브태스크를 추가하고 체크한다"
    then: "체크리스트에 항목이 추가되고 진행률이 표시된다"
    examples:
      - input: { subtask: "계란 2판" }
        expect: { subtaskText: "계란 2판", visible: true }
      - input: { subtask: "계란 2판", checked: true, total: 2, completed: 1 }
        expect: { progress: "1/2", strikethrough: true }

  - id: "KANBAN-006"
    name: "제목 검색"
    given: "'우유 사기', '빵 사기', '회의록 작성' 카드가 있는 칸반 보드"
    when: "검색란에 텍스트를 입력한다"
    then: "제목에 검색어가 포함된 카드만 표시된다"
    examples:
      - input: { searchText: "우유" }
        expect: { visibleCards: ["우유 사기"], hiddenCards: ["빵 사기", "회의록 작성"] }
      - input: { searchText: "" }
        expect: { visibleCardCount: 3 }
      - input: { searchText: "존재하지않는검색어" }
        expect: { visibleCardCount: 0, emptyMessage: "검색 결과가 없습니다" }

  - id: "KANBAN-007"
    name: "우선순위·태그 필터"
    given: "우선순위와 태그가 설정된 카드들이 있는 칸반 보드"
    when: "필터 옵션에서 우선순위나 태그를 선택한다"
    then: "선택한 조건에 맞는 카드만 표시된다"
    examples:
      - input: { priorityFilter: "높음" }
        expect: { allVisibleCardsPriority: "높음" }
      - input: { tagFilter: "장보기" }
        expect: { allVisibleCardsHaveTag: "장보기" }
      - input: { priorityFilter: "높음", tagFilter: "장보기" }
        expect: { allVisibleCardsPriority: "높음", allVisibleCardsHaveTag: "장보기" }
      - input: { priorityFilter: null, tagFilter: null }
        expect: { allCardsVisible: true }

  - id: "KANBAN-008"
    name: "다크모드 토글"
    given: "라이트 모드로 표시된 칸반 보드"
    when: "다크모드 토글 버튼을 클릭한다"
    then: "테마가 반대 모드로 전환된다"
    examples:
      - input: { currentMode: "light", action: "toggle" }
        expect: { theme: "dark" }
      - input: { currentMode: "dark", action: "toggle" }
        expect: { theme: "light" }

  - id: "KANBAN-009"
    name: "데이터 영속성"
    given: "카드가 추가/수정/이동된 칸반 보드"
    when: "페이지를 새로고침한다"
    then: "모든 변경사항이 유지되어 이전 상태 그대로 표시된다"
    examples:
      - input: { action: "addCard", title: "우유 사기", column: "To Do", reload: true }
        expect: { cardText: "우유 사기", column: "To Do" }
      - input: { action: "moveCard", card: "우유 사기", to: "Done", reload: true }
        expect: { cardText: "우유 사기", column: "Done" }
      - input: { action: "checkSubtask", card: "우유 사기", subtask: "계란 2판", reload: true }
        expect: { subtaskChecked: true }

  - id: "KANBAN-010"
    name: "빈 칼럼 안내"
    given: "카드가 없는 칼럼이 있는 칸반 보드"
    when: "빈 칼럼을 확인한다"
    then: "'카드가 없습니다' 안내 문구가 표시된다"
    examples:
      - input: { column: "To Do", cardCount: 0 }
        expect: { emptyMessage: "카드가 없습니다", visible: true }
      - input: { column: "To Do", cardCount: 1 }
        expect: { emptyMessage: "카드가 없습니다", visible: false }

  - id: "KANBAN-011"
    name: "마감일 초과 표시"
    given: "마감일이 설정된 카드가 있는 칸반 보드"
    when: "마감일이 오늘 날짜를 지났으면"
    then: "마감일이 초과 상태로 강조 표시된다"
    examples:
      - input: { dueDate: "2026-03-01", today: "2026-03-19" }
        expect: { overdue: true }
      - input: { dueDate: "2026-03-25", today: "2026-03-19" }
        expect: { overdue: false }

  - id: "KANBAN-012"
    name: "다크모드 영속성"
    given: "다크모드가 활성화된 상태"
    when: "페이지를 새로고침한다"
    then: "다크모드가 유지된다"
    examples:
      - input: { currentMode: "dark", reload: true }
        expect: { theme: "dark" }

  - id: "KANBAN-013"
    name: "검색과 필터 동시 적용"
    given: "'우유 사기(높음)', '빵 사기(높음)', '회의록 작성(낮음)' 카드가 있는 칸반 보드"
    when: "검색란에 텍스트를 입력하고 필터를 선택한다"
    then: "두 조건을 모두 만족하는 카드만 표시된다"
    examples:
      - input: { searchText: "사기", priorityFilter: "높음" }
        expect: { visibleCards: ["우유 사기", "빵 사기"], hiddenCards: ["회의록 작성"] }
      - input: { searchText: "우유", priorityFilter: "낮음" }
        expect: { visibleCardCount: 0, emptyMessage: "검색 결과가 없습니다" }
